version: 2

models:
  - name: int_Sephora_Product
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        data_type: string
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: product_name
        data_type: string
      - name: brand_id
        data_type: string
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Brand
            to_columns: [brand_id]
        tests:
          - relationships:
              to: ref('int_Brand')
              field: brand_id
      - name: variation_id
        data_type: integer
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Product_Variation
            to_columns: [variation_id]
        tests:
          - relationships:
              to: ref('int_Product_Variation')
              field: variation_id
      - name: stock_status_id
        data_type: integer      
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Product_Stock_Status
            to_columns: [stock_status_id]
        tests:
          - relationships:
              to: ref('int_Product_Stock_Status')
              field: stock_status_id
      - name: price_id
        data_type: integer
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Product_Price
            to_columns: [price_id]
        tests:
          - relationships:
              to: ref('int_Product_Price')
              field: price_id
      - name: size_id
        data_type: integer
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Product_Size
            to_columns: [size_id]
        tests:
          - relationships:
              to: ref('int_Product_Size')
              field: size_id
      - name: rating
        data_type: float
      - name: reviews
        data_type: integer
      - name: loves_count
        data_type: integer
  - name: int_Brand
    config:
      contract:
        enforced: true
    columns:
      - name: brand_id
        data_type: string
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: brand_name
        data_type: string  
  - name: int_Category
    config:
      contract:
        enforced: true
    columns:
      - name: category_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: category_name
        data_type: string
  - name: int_Feature_Highlight
    config:
      contract:
        enforced: true
    columns:
      - name: highlight_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: feature_highlight
        data_type: string
  - name: int_Product_Category
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        data_type: string
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: category_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
  - name: int_Product_Highlight
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        data_type: string
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: highlight_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
  - name: int_Product_Ingredient
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        data_type: string
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: ingredient_unique_name
        data_type: string
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
  - name: int_Product_Price
    config:
      contract:
        enforced: true
    columns:
      - name: price_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: product_id
        data_type: string
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Sephora_Product
            to_columns: [product_id]
        tests:
          - relationships:
              to: ref('int_Sephora_Product')
              field: product_id
      - name: price_usd
        data_type: float
      - name: value_price_usd
        data_type: float
      - name: sale_price_usd
        data_type: float
  - name: int_Product_Size
    config:
      contract:
        enforced: true
    columns:
      - name: size_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: product_id
        data_type: string
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Sephora_Product
            to_columns: [product_id]
        tests:
          - relationships:
              to: ref('int_Sephora_Product')
              field: product_id
      - name: other_size
        data_type: string
      - name: imperial_size
        data_type: string
      - name: metric_size
        data_type: string
  - name: int_Product_Stock_Status
    config:
      contract:
        enforced: true
    columns:
      - name: stock_status_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: product_id
        data_type: string
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Sephora_Product
            to_columns: [product_id]
        tests:
          - relationships:
              to: ref('int_Sephora_Product')
              field: product_id
      - name: limited_edition
        data_type: boolean
      - name: new_product
        data_type: boolean
      - name: online_only
        data_type: boolean
      - name: out_of_stock
        data_type: boolean
      - name: sephora_exclusive
        data_type: boolean
  - name: int_Product_Variation
    config:
      contract:
        enforced: true
    columns:
      - name: variation_id
        data_type: integer
        constraints:
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: product_id
        data_type: string
        constraints:
          - type: foreign_key
            to: inc_skincare_products_int.int_Sephora_Product
            to_columns: [product_id]
        tests:
          - relationships:
              to: ref('int_Sephora_Product')
              field: product_id
      - name: variation_count
        data_type: integer
      - name: variation_max_price
        data_type: float
      - name: variation_min_price
        data_type: float